build:
    context: .
    dockerfile: Dockerfile
deploy:
    maxInstances: 1
    minInstances: 1
    port: 8080
    resources:
        cpu: "4"
        memory: 32Gi
    volumes:
        - name: ollama-models
          mountPath: /app/.ollama
          size: 25Gi
environment:
    - name: PORT
      value: "8080"
    - name: MODEL
      value: gemma3:4b
    - name: OLLAMA_HOST
      value: 127.0.0.1:11434
    - name: OLLAMA_MODELS
      value: /app/.ollama/models
    - name: PYTHONUNBUFFERED
      value: "1"
    - name: OLLAMA_NUM_PARALLEL
      value: "1"
    - name: OLLAMA_NUM_THREADS
      value: "4"
    - name: GOMEMLIMIT
      value: "28000MiB"
    - name: RATE_LIMIT
      value: "120/minute"
    - name: MAX_QUEUE_DEPTH
      value: "8"
    - name: QUEUE_TIMEOUT_SECONDS
      value: "20"
    - name: DEFAULT_TEMPERATURE
      value: "0.2"
    - name: DEFAULT_NUM_PREDICT
      value: "1024"
    - name: DEFAULT_NUM_CTX
      value: "8192"
    - name: DEFAULT_NUM_BATCH
      value: "128"
    - name: MAX_HISTORY_CHARS
      value: "20000"
    - name: OLLAMA_LLM_LIBRARY
      value: cpu
    - name: OLLAMA_KEEP_ALIVE
      value: "-1"
    - name: OLLAMA_MAX_LOADED_MODELS
      value: "1"
    - name: OLLAMA_FLASH_ATTENTION
      value: "1"
    - name: OLLAMA_KV_CACHE_TYPE
      value: q8_0
    - name: OLLAMA_USE_MMAP
      value: "1"
serverlessConfig:
    Env:
        APPLICATION_ENV_PREFIX: BOLT
        BOLT_APPLICATION_ACCOUNT_ID: b274cb0b-f8b2-4aac-b79f-71eb7d2e3fe5
        BOLT_APPLICATION_AUTO_STOP: "false"
        BOLT_APPLICATION_CODE_TYPE: ""
        BOLT_APPLICATION_LANGUAGE: python/3.11
        BOLT_APPLICATION_MAX_IDLE_TIME: "300"
        BOLT_APPLICATION_NAME: llama Qwen
        BOLT_APPLICATION_ORG_ID: b274cb0b-f8b2-4aac-b79f-71eb7d2e3fe5
        BOLT_APPLICATION_PORT: "8080"
        BOLT_APPLICATION_PROTOCOL: http
        BOLT_APPLICATION_REGION_ID: asia-south1
        BOLT_APPLICATION_RUNTIME: git
        BOLT_APPLICATION_SLUG: llama-qwen
        BOLT_APPLICATION_VERSION: "0"
    PortMap:
        - Protocol: http
          Port: 8080
          Name: http
    Scaling:
        AutoStop: false
        Min: 1
        Max: 1
        MaxIdleTime: 300
    Resources:
        CPU: 16
        MemoryMB: 32768
        MemoryMaxMB: 32768
        DiskMB: 30720
    Timeout: 60
service:
    description: Ollama Gemma3 4B AI Assistant — React frontend + FastAPI backend
    name: ollama-ai-assistant
version: "1"
