version: "1"

service:
  name: ollama-ai-assistant
  description: "Ollama Phi-3 Mini AI Assistant — React frontend + FastAPI backend"

build:
  context: .
  dockerfile: Dockerfile

deploy:
  port: 8080
  minInstances: 1
  maxInstances: 2
  resources:
    cpu: "2"
    memory: "4Gi"

environment:
  - name: PORT
    value: "8080"
  - name: MODEL
    value: "phi3:mini"
  - name: OLLAMA_HOST
    value: "127.0.0.1:11434"
  - name: PYTHONUNBUFFERED
    value: "1"
  - name: OLLAMA_FLASH_ATTENTION
    value: "1"
  - name: OLLAMA_KEEP_ALIVE
    value: "0"
  - name: GOMEMLIMIT
    value: "2500MiB"
  # Override Ollama's internal free memory check (which fails on Serverless)
  - name: OLLAMA_MAX_VRAM
    value: "2147483648" # 2GB in bytes
  # Force pure CPU computation (avoids crashing on missing AVX instructions in serverless VM)
  - name: OLLAMA_LLM_LIBRARY
    value: "cpu"
