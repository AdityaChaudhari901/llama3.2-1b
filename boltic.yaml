build:
    context: .
    dockerfile: Dockerfile
deploy:
    maxInstances: 1
    minInstances: 1
    port: 8080
    resources:
        cpu: "8"
        memory: 32Gi
environment:
    - name: PORT
      value: "8080"
    - name: OPENROUTER_API_KEY
      value: ${OPENROUTER_API_KEY}
    - name: MODEL
      value: openai/gpt-4o-mini
    - name: EMBEDDINGS_MODEL
      value: openai/text-embedding-3-small
    - name: DEFAULT_TEMPERATURE
      value: "0.45"
    - name: DEFAULT_MAX_TOKENS
      value: "2048"
    - name: MAX_INPUT_LENGTH
      value: "2000"
    - name: MAX_HISTORY_CHARS
      value: "40000"
    - name: APP_SITE_URL
      value: https://llama-qwen-e5b9730c.serverless.boltic.app
    - name: APP_TITLE
      value: Fynd AI
    - name: BOLTIC_TOKEN
      value: 15647a83-d0be-4e24-b352-97bbc688d695
    - name: BOLTIC_PRODUCTS_TABLE
      value: 735364bf-48e3-4723-b549-e3e123562d2a
    - name: BOLTIC_RECS_TABLE
      value: db2b84be-744e-4e16-a369-d3d7d17b2ec4
    - name: PYTHONUNBUFFERED
      value: "1"
    - name: WEB_CONCURRENCY
      value: "6"
serverlessConfig:
    Env:
        BOLTIC_TOKEN: 15647a83-d0be-4e24-b352-97bbc688d695
        EMBEDDINGS_MODEL: openai/text-embedding-3-small
        MODEL: openai/gpt-4o-mini
        OPENROUTER_API_KEY: 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
    PortMap:
        - Protocol: http
          Port: 8080
          Name: http
    Scaling:
        AutoStop: false
        Min: 1
        Max: 1
        MaxIdleTime: 300
    Resources:
        CPU: 8
        MemoryMB: 32768
        MemoryMaxMB: 32768
        DiskMB: 100
    Timeout: 60
service:
    description: Fynd AI — React frontend + FastAPI + OpenRouter
    name: fynd-ai
version: "1"
