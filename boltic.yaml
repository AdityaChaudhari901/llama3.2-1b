version: "1"

service:
  name: ollama-ai-assistant
  description: "Ollama llama3.2:1b AI Assistant — React frontend + FastAPI backend"

build:
  context: .
  dockerfile: Dockerfile

deploy:
  port: 8080
  minInstances: 1
  maxInstances: 2
  resources:
    cpu: "2"
    memory: "6Gi"

environment:
  - name: PORT
    value: "8080"
  - name: MODEL
    value: "llama3.2:1b"
  - name: OLLAMA_HOST
    value: "127.0.0.1:11434"
  - name: PYTHONUNBUFFERED
    value: "1"
  - name: OLLAMA_FLASH_ATTENTION
    value: "1"
  - name: OLLAMA_KEEP_ALIVE
    value: "0"
  - name: GOMEMLIMIT
    value: "4500MiB"

